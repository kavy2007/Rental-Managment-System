<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - RentFlow</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
            border-top: 4px solid var(--primary);
        }

        .logo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 2rem;
        }

        .logo-placeholder i {
            color: var(--primary);
        }
    </style>
</head>
<body class="doodle-bg">

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="logo-placeholder">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Admin Portal</span>
            </div>

            <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
                <h2 class="text-xl font-bold mb-6">Secure Login</h2>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Admin ID / Email</label>
                    <input type="email" class="form-control" placeholder="admin@rentflow.com" required>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block mt-4" style="height: 44px;">
                    Access Dashboard
                </button>
                
                <div class="mt-4" style="font-size: 0.875rem;">
                    <a href="../../index.html" class="text-muted"><i class="fa-solid fa-arrow-left"></i> Back to Customer Portal</a>
                </div>
            </form>

        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        function handleAdminLogin(e) {
            e.preventDefault();
            localStorage.setItem('user', JSON.stringify({ role: 'admin', name: 'Super Admin' }));
            window.location.href = './dashboard.html';
        }
    </script>
</body>
</html>
