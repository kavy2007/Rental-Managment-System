<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RentX</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            padding: 2rem 0;
        }

        .checkout-form-container {
            background: #FFF;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 2rem;
        }

        .summary-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            height: fit-content;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .checkout-item {
            display: flex;
            justify-content: space-between;
            padding-bottom: 0.75rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .checkout-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="home.html" class="flex items-center gap-2" style="font-size: 1.25rem; font-weight: 700;">
                <i class="fa-solid fa-box-open" style="color: var(--primary);"></i>
                <span>RentX</span>
            </a>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link">Rentals</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" style="position: relative; color: var(--primary);">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span class="cart-badge badge-orange" style="position: absolute; top: -8px; right: -8px; font-size: 0.65rem; padding: 2px 6px; display: none;">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="mt-4">
            <a href="cart.html" class="text-muted text-sm"><i class="fa-solid fa-arrow-left"></i> Back to Cart</a>
        </div>

        <h1 class="text-2xl font-bold mt-4">Checkout</h1>
        
        <form class="checkout-grid" id="checkout-form" onsubmit="handleCheckout(event)">
            <!-- Billing / Shipping Form -->
            <div class="checkout-form-container">
                <h2 class="text-xl font-bold mb-6">Delivery Details</h2>
                
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group mb-0" style="flex: 1;">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="co-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group mb-0" style="flex: 1;">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="co-email" placeholder="john@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" id="co-address" placeholder="123 Main St, Apartment 4B" required>
                </div>

                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group mb-0" style="flex: 2;">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" id="co-city" placeholder="Mumbai" required>
                    </div>
                    <div class="form-group mb-0" style="flex: 1;">
                        <label class="form-label">Zip Code</label>
                        <input type="text" class="form-control" id="co-zip" placeholder="400001" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Country</label>
                    <input type="text" class="form-control" id="co-country" placeholder="India" required>
                </div>
            </div>

            <!-- Summary -->
            <div class="summary-card">
                <h3 class="font-bold mb-4">Order Summary</h3>
                
                <div id="checkout-items" class="mb-4" style="background: #FFF; padding: 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                    <!-- Injected via JS -->
                </div>

                <div id="summary-container">
                    <!-- Injected via JS -->
                </div>
                
                <button type="submit" class="btn btn-primary btn-block mt-6" id="confirm-btn">
                    Confirm Order
                </button>
            </div>
        </form>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCheckoutSummary();
            prefillUserData();
        });

        function prefillUserData() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && user.name) {
                document.getElementById('co-name').value = user.name;
            }
        }

        let totalAmount = 0;

        function renderCheckoutSummary() {
            const cart = getCart();
            const itemsContainer = document.getElementById('checkout-items');
            const summaryContainer = document.getElementById('summary-container');
            const confirmBtn = document.getElementById('confirm-btn');

            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            let subtotal = 0;
            let totalDeposit = 0;

            itemsContainer.innerHTML = cart.map((item) => {
                const durationNum = parseInt(item.duration);
                const rate = item.ratePrice || item.pricePerDay;
                const itemRentalTotal = rate * durationNum * item.quantity;
                const itemDepositTotal = item.securityDeposit * item.quantity;
                
                subtotal += itemRentalTotal;
                totalDeposit += itemDepositTotal;

                return `
                    <div class="checkout-item">
                        <div>
                            <div class="font-bold text-sm">${item.name} (x${item.quantity})</div>
                            <div class="text-xs text-muted">Duration: ${item.duration}</div>
                        </div>
                        <div class="font-bold text-sm">₹${itemRentalTotal}</div>
                    </div>
                `;
            }).join('');

            totalAmount = subtotal + totalDeposit + (subtotal * 0.1);

            summaryContainer.innerHTML = `
                <div class="summary-row">
                    <span>Rental Subtotal</span>
                    <span>₹${subtotal}</span>
                </div>
                <div class="summary-row">
                    <span>Security Deposit</span>
                    <span>₹${totalDeposit}</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%)</span>
                    <span>₹${(subtotal * 0.1).toFixed(2)}</span>
                </div>
                <div class="summary-row mt-4" style="border-top: 1px solid var(--border-color); padding-top: 1rem; font-weight: 700; font-size: 1.125rem;">
                    <span>Total Due</span>
                    <span style="color: var(--primary)">₹${totalAmount.toFixed(2)}</span>
                </div>
            `;
        }

        async function handleCheckout(e) {
            e.preventDefault();
            
            const btn = document.getElementById('confirm-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                // 1. Create order in our backend
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) {
                    showToast('Please log in first', 'error');
                    window.location.href = '../../index.html';
                    return;
                }

                const cart = getCart();
                const items = cart.map(i => {
                    let durationDays = parseInt(i.duration);
                    if (i.duration.includes('Week')) {
                        durationDays *= 7;
                    } else if (i.duration.includes('Month')) {
                        durationDays *= 30;
                    }
                    
                    return {
                        variant_id: i.variant_id || i.id,
                        quantity: i.quantity,
                        price: i.ratePrice || i.pricePerDay,
                        start_date: new Date().toISOString().slice(0, 19).replace('T', ' '),
                        end_date: new Date(Date.now() + durationDays*24*60*60*1000).toISOString().slice(0, 19).replace('T', ' '),
                        duration: parseInt(i.duration),
                        security_deposit: i.securityDeposit || (i.pricePerDay * 2)
                    };
                });

                const orderResponse = await window.RentXAPI.createOrder({
                    customer_id: user.id, // Ensure user.id exists (mocked or real)
                    items: items
                });

                const rzpResponse = await window.RentXAPI.createPaymentOrder(totalAmount);
                
                // 3. Open Razorpay Checkout
                const options = {
                    "key": rzpResponse.key,
                    "amount": rzpResponse.amount,
                    "currency": rzpResponse.currency,
                    "name": "RentX",
                    "description": "Equipment Rental Payment",
                    "order_id": rzpResponse.id,
                    "handler": async function (response) {
                        try {
                            await window.RentXAPI.verifyPayment({
                                order_id: orderResponse.order_id,
                                amount: totalAmount,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_signature: response.razorpay_signature
                            });
                            
                            showToast('Payment Successful! Order Placed.', 'success');
                            setTimeout(() => {
                                localStorage.removeItem('rentx_cart');
                                window.location.href = `invoice.html?id=${orderResponse.order_id}`;
                            }, 2000);
                        } catch (err) {
                            showToast('Payment verification failed', 'error');
                        }
                    },
                    "prefill": {
                        "name": user.name,
                        "email": user.email
                    },
                    "theme": {
                        "color": "#2563eb"
                    }
                };
                
                const rzp = new window.Razorpay(options);
                rzp.on('payment.failed', function (response){
                    btn.innerHTML = 'Complete Order';
                    btn.disabled = false;
                    showToast('Payment Failed. Try again.', 'error');
                });
                rzp.open();

            } catch (err) {
                btn.innerHTML = 'Complete Order';
                btn.disabled = false;
                showToast(err.message || 'Checkout failed', 'error');
            }
        }
    </script>
</body>
</html>
