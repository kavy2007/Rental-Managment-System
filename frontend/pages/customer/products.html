<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentals - RentX</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .layout-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            padding: 2rem 0;
        }
        
        .sidebar-filters {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            height: fit-content;
        }
        
        .filter-section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .filter-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
        }
        
        /* Checkbox styling */
        .filter-label input[type="checkbox"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .product-card {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-details {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: auto;
            padding-top: 1rem;
        }

        @media (max-width: 768px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="home.html" class="flex items-center gap-2" style="font-size: 1.25rem; font-weight: 700;">
                <i class="fa-solid fa-box-open" style="color: var(--primary);"></i>
                <span>RentX</span>
            </a>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link" style="color: var(--primary);">Rentals</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" style="position: relative; color: var(--text-dark);">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span class="cart-badge badge-orange" style="position: absolute; top: -8px; right: -8px; font-size: 0.65rem; padding: 2px 6px; display: none;">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container layout-grid">
        
        <!-- Sidebar Filters -->
        <aside class="sidebar-filters">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">Filters</h3>
                <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="resetFilters()">Clear</button>
            </div>
            
            <div class="filter-section">
                <div class="form-group mb-0">
                    <input type="text" class="form-control" id="search-input" placeholder="Search products..." onkeyup="applyFilters()">
                </div>
            </div>

            <div class="filter-section">
                <h4 class="font-semibold mb-2">Category</h4>
                <label class="filter-label"><input type="checkbox" value="Electronics" class="filter-category" onchange="applyFilters()"> Electronics</label>
                <label class="filter-label"><input type="checkbox" value="Tools" class="filter-category" onchange="applyFilters()"> Tools</label>
                <label class="filter-label"><input type="checkbox" value="Events" class="filter-category" onchange="applyFilters()"> Events</label>
                <label class="filter-label"><input type="checkbox" value="Sports" class="filter-category" onchange="applyFilters()"> Sports</label>
            </div>

            <div class="filter-section">
                <h4 class="font-semibold mb-2">Availability</h4>
                <label class="filter-label"><input type="checkbox" value="Available" class="filter-status" onchange="applyFilters()"> Show Only Available</label>
            </div>

            <div class="filter-section">
                <h4 class="font-semibold mb-2">Price Range (/day)</h4>
                <label class="filter-label"><input type="checkbox" value="0-50" class="filter-price" onchange="applyFilters()"> Under ₹50</label>
                <label class="filter-label"><input type="checkbox" value="50-100" class="filter-price" onchange="applyFilters()"> ₹50 - ₹100</label>
                <label class="filter-label"><input type="checkbox" value="100-200" class="filter-price" onchange="applyFilters()"> ₹100 - ₹200</label>
                <label class="filter-label"><input type="checkbox" value="200-999999" class="filter-price" onchange="applyFilters()"> Over ₹200</label>
            </div>
        </aside>

        <!-- Product Grid -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">All Rentals</h2>
                <span class="text-muted text-sm" id="result-count">0 Results</span>
            </div>
            
            <div class="product-grid" id="product-grid">
                <!-- Populated by JS -->
            </div>
        </div>

    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/main.js"></script>
    <script>
        let allProducts = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const initialCategory = urlParams.get('category');
            
            if (initialCategory) {
                const checkboxes = document.querySelectorAll('.filter-category');
                checkboxes.forEach(cb => {
                    if (cb.value.toLowerCase() === initialCategory.toLowerCase()) {
                        cb.checked = true;
                    }
                });
            }
            
            try {
                // Fetch products from backend
                allProducts = await window.RentXAPI.getProducts();
                applyFilters();
            } catch (err) {
                console.error("Failed to load products", err);
                document.getElementById('product-grid').innerHTML = '<div class="col-span-full text-center py-8 text-red-500">Failed to load products from server. Make sure the Flask backend is running.</div>';
            }
        });

        function resetFilters() {
            document.getElementById('search-input').value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            applyFilters();
        }

        function applyFilters() {
            if (!allProducts || allProducts.length === 0) return;

            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            const categoryCheckboxes = document.querySelectorAll('.filter-category:checked');
            const selectedCategories = Array.from(categoryCheckboxes).map(cb => cb.value);
            
            const showAvailableOnly = document.querySelector('.filter-status').checked;

            const priceCheckboxes = document.querySelectorAll('.filter-price:checked');
            const selectedPrices = Array.from(priceCheckboxes).map(cb => {
                const [min, max] = cb.value.split('-').map(Number);
                return { min, max };
            });

            let filtered = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm) || p.brand.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategories.length === 0 || selectedCategories.includes(p.category);
                const matchesAvailability = !showAvailableOnly || p.status === 'Available';
                
                let matchesPrice = true;
                if (selectedPrices.length > 0) {
                    matchesPrice = selectedPrices.some(range => p.pricePerDay >= range.min && p.pricePerDay <= range.max);
                }
                
                return matchesSearch && matchesCategory && matchesAvailability && matchesPrice;
            });

            renderProducts(filtered);
        }

        function renderProducts(products) {
            const container = document.getElementById('product-grid');
            document.getElementById('result-count').textContent = `${products.length} Results`;
            
            if (products.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-8 text-muted">No products found matching your criteria.</div>`;
                return;
            }

            container.innerHTML = products.map(p => `
                <div class="card product-card" style="cursor: pointer;" onclick="window.location.href='detail.html?id=${p.id}'">
                    <img src="${p.image}" class="product-image" alt="${p.name}">
                    <div class="product-details">
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-sm text-muted">${p.brand}</div>
                            <span class="badge ${p.status === 'Available' ? 'badge-green' : 'badge-orange'}">${p.status}</span>
                        </div>
                        <h3 class="font-bold text-lg mb-1">${p.name}</h3>
                        <div class="text-sm text-muted mb-4">
                            ${p.category}
                        </div>
                        <div class="product-price">
                            ₹${p.pricePerDay} <span class="text-sm text-muted font-normal">/ day</span>
                        </div>
                        <div class="text-sm ${p.stock > 0 ? 'text-green' : 'text-red'} font-semibold mt-1">
                            ${p.stock > 0 ? p.stock + ' in stock' : 'Out of Stock'}
                        </div>
                        <a href="detail.html?id=${p.id}" class="btn btn-primary btn-block mt-4 text-center" style="text-decoration: none; ${p.stock <= 0 ? 'pointer-events: none; opacity: 0.5' : ''}" onclick="event.stopPropagation();">
                            ${p.stock > 0 ? 'Rent Now' : 'Out of Stock'}
                        </a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
