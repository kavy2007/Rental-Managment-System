<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rental Management System</title>
    <link rel="stylesheet" href="./css/styles.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .logo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .toggle-link {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            display: block;
        }
        
        .toggle-link span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }
        
        .toggle-link span:hover {
            text-decoration: underline;
        }
        
        #signup-form {
            display: none;
        }
    </style>
</head>
<body class="doodle-bg">

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="logo-placeholder">
                <i class="fa-solid fa-box-open"></i>
                <span>RentX</span>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <h2 class="text-xl font-bold mb-6">Welcome Back</h2>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="admin@rentx.com" required>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block mt-4" style="height: 44px;">
                    Login
                </button>
                
                <div class="toggle-link">
                    Don't have an account? <span onclick="toggleForms()">Sign up</span>
                </div>
                <div class="toggle-link" style="margin-top: 0.5rem">
                    Are you an admin? <a href="./pages/admin/login.html" style="font-weight: 600;">Admin Login</a>
                </div>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" onsubmit="handleSignup(event)">
                <h2 class="text-xl font-bold mb-6">Create Account</h2>
                
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="text-align: left; flex: 1;">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" placeholder="John" required id="signup-firstname">
                    </div>
                    
                    <div class="form-group" style="text-align: left; flex: 1;">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe" required id="signup-lastname">
                    </div>
                </div>

                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Email ID</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required id="signup-email">
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required id="signup-password">
                </div>

                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required id="signup-confirm-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block mt-4" style="height: 44px;">
                    Sign Up
                </button>
                
                <div class="toggle-link">
                    Already have an account? <span onclick="toggleForms()">Login</span>
                </div>
            </form>

        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/main.js"></script>
    <script>
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await window.RentXAPI.login(email, password);
                localStorage.setItem('user', JSON.stringify(response.user));
                
                if (response.user.role === 'admin') {
                    window.location.href = './pages/admin/dashboard.html';
                } else {
                    window.location.href = './pages/customer/home.html';
                }
            } catch (err) {
                // Handled by apiFetch showToast, but can also alert
                console.error("Login failed:", err);
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;
            const firstName = document.getElementById('signup-firstname').value;
            const lastName = document.getElementById('signup-lastname').value;
            
            if (password !== confirmPassword) {
                showToast('Passwords do not match!', 'error');
                return;
            }

            try {
                const name = `${firstName} ${lastName}`;
                await window.RentXAPI.register(email, password, name);
                
                // Auto login after signup
                const response = await window.RentXAPI.login(email, password);
                localStorage.setItem('user', JSON.stringify(response.user));
                window.location.href = './pages/customer/home.html';
            } catch (err) {
                console.error("Signup failed:", err);
            }
        }
    </script>
</body>
</html>
